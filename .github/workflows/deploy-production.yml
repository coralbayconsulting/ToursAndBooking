# PRODUCTION — deploys to the App Service DEFAULT slot (live site).
# Does NOT run automatically on every push to main (use staging workflow for that).
#
# Run manually: Actions → "Deploy to Azure — bluestradatours (PRODUCTION)" → Run workflow.
#
# Troubleshooting:
# - Always deploys from branch `main` (see checkout ref), so you get the same tree as GitHub main
#   even if you accidentally run the workflow from another branch in the UI.
# - If deploy "succeeds" but the site does not change: check Azure RBAC — the GitHub OIDC app
#   needs permission to deploy the *default* app (not only the staging slot). Add resource
#   group in GitHub repo variable AZURE_RESOURCE_GROUP if the action cannot resolve the app.
#
# Docs: https://github.com/Azure/webapps-deploy

name: Deploy to Azure — bluestradatours (PRODUCTION)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      # Always use main so manual runs cannot deploy an empty/wrong branch by mistake.
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      # Same pattern as staging workflow: ./* avoids zipping hidden dirs like .git at repo root.
      - name: Zip site for deployment
        run: zip -r release.zip ./*

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_4E938FD16E3D4ABB97873DF557913CF9 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_80D0218D465E49219EBC687AF0098B6B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_BEF30C7BEE314963B77018828D554DC4 }}

      # Deploy the zip directly (same payload as staging; avoids artifact download path issues).
      # Omit slot-name → default production app (not the named "staging" slot).
      # Optional: set repo variable AZURE_RESOURCE_GROUP and uncomment the next line if deploy
      # fails to resolve the app (duplicate names across RGs).
      - name: Deploy to Azure Web App (production)
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'bluestradatours'
          package: release.zip
          restart: true
